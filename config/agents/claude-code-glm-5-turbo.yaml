# NEEDLE Agent Configuration: Claude Code with GLM-5-Turbo
# Uses Claude Code CLI with ZhipuAI GLM-5-Turbo model (Z.AI endpoint)
# GLM-5-Turbo is optimized for OpenClaw/agent scenarios: tool calling, instruction following,
# scheduled/persistent tasks, and high-throughput long-chain execution.

# Agent metadata
name: claude-code-glm-5-turbo
description: Claude Code with ZhipuAI GLM-5-Turbo (agent-optimized, 200K context)
version: "1.0"

# CLI identification
runner: claude          # CLI executable name
provider: zai           # Provider for rate limiting (ZhipuAI/Z.AI)
model: glm-5-turbo      # Model identifier

# Invocation template
# Variables: ${WORKSPACE}, ${PROMPT}, ${BEAD_ID}, ${BEAD_TITLE}, ${AGENT_DIR}
# NOTE: unset CLAUDECODE prevents nested session detection when running inside Claude Code
# Auth is handled by the zai-proxy running in apexalgo-iad (no API key needed on disk)
# The stream-parser.sh pipe converts raw JSONL into human-readable terminal output.
invoke: |
  cd ${WORKSPACE} && \
  unset CLAUDECODE && \
  ANTHROPIC_BASE_URL=http://zai-proxy-apexalgo.tail1b1987.ts.net:8080 \
  ANTHROPIC_AUTH_TOKEN=proxy-handles-auth \
  ANTHROPIC_MODEL=glm-5-turbo \
  ANTHROPIC_DEFAULT_OPUS_MODEL=glm-5-turbo \
  ANTHROPIC_DEFAULT_SONNET_MODEL=glm-5-turbo \
  ANTHROPIC_DEFAULT_HAIKU_MODEL=glm-5-turbo \
  CLAUDE_CODE_SUBAGENT_MODEL=glm-5-turbo \
  DISABLE_AUTOUPDATER=1 \
  DISABLE_TELEMETRY=1 \
  claude --print \
         --dangerously-skip-permissions \
         --output-format stream-json \
         --verbose \
  <<'NEEDLE_PROMPT'
  ${PROMPT}
  NEEDLE_PROMPT
  | ${AGENT_DIR}/stream-parser.sh

# Input method
input:
  method: heredoc      # heredoc | stdin | file | args

# Output parsing
output:
  format: stream-json  # json | text | stream-json
  streaming_enabled: true
  success_codes: [0]
  retry_codes: [1]
  fail_codes: [2, 137]

# Rate limits (GLM-5-Turbo - agent-optimized, higher concurrency)
limits:
  requests_per_minute: 60
  max_concurrent: 10

# Cost configuration (pay-per-token)
cost:
  type: pay_per_token
  input_per_1k: 0.001
  output_per_1k: 0.002

# Timeout in seconds (128K max output warrants generous timeout)
timeout: 900

# Model-specific prompt instructions
# GLM models tend to shortcut completion by running br close without doing work.
# This suffix enforces actual code changes before completion.
prompt_suffix: |
  CRITICAL RULES FOR THIS MODEL:
  - You MUST write or modify files before completing. Empty completions are failures.
  - Do NOT run br close. Exit with code 0 when done. The system handles bead closure.
  - If you cannot do the work, exit with code 1. Do NOT close the bead.
  - Commit your changes with git add and git commit before exiting.

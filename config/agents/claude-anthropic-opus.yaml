# NEEDLE Agent Configuration: Claude Code with Anthropic Opus
# This configuration defines how NEEDLE invokes Claude Code with Opus model

# Agent metadata
name: claude-anthropic-opus
description: Claude Code with Anthropic Opus model (most capable)
version: "1.0"

# CLI identification
runner: claude          # CLI executable name
provider: anthropic     # Provider for rate limiting
model: opus            # Model identifier

# Invocation template
# Variables: ${WORKSPACE}, ${PROMPT}, ${BEAD_ID}, ${BEAD_TITLE}
# NOTE: unset CLAUDECODE prevents nested session detection when running inside Claude Code
invoke: |
  cd ${WORKSPACE} && \
  unset CLAUDECODE && \
  ANTHROPIC_MODEL=claude-opus-4-5-20251001 \
  claude --print \
         --dangerously-skip-permissions \
         --output-format stream-json \
         --verbose \
  <<'NEEDLE_PROMPT'
  ${PROMPT}
  NEEDLE_PROMPT

# Input method
input:
  method: heredoc      # heredoc | stdin | file | args

# Output parsing
output:
  format: stream-json  # json | text | stream-json
  streaming_enabled: true
  success_codes: [0]
  retry_codes: [1]
  fail_codes: [2, 137]

# Rate limits (Opus is more expensive, lower concurrency)
limits:
  requests_per_minute: 20
  max_concurrent: 2

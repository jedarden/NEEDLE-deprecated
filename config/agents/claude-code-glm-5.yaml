# NEEDLE Agent Configuration: Claude Code with GLM-5
# Uses Claude Code CLI with ZhipuAI GLM-5 model

# Agent metadata
name: claude-code-glm-5
description: Claude Code with ZhipuAI GLM-5 model
version: "1.0"

# CLI identification
runner: claude          # CLI executable name
provider: zai           # Provider for rate limiting (ZhipuAI)
model: glm-5            # Model identifier

# Invocation template
# Variables: ${WORKSPACE}, ${PROMPT}, ${BEAD_ID}, ${BEAD_TITLE}, ${AGENT_DIR}
# NOTE: unset CLAUDECODE prevents nested session detection when running inside Claude Code
# Uses ZAI_API_KEY env var for authentication (set in workspace or secret)
# The stream-parser.sh pipe converts raw JSONL into human-readable terminal output.
invoke: |
  cd ${WORKSPACE} && \
  unset CLAUDECODE && \
  ANTHROPIC_BASE_URL=https://open.bigmodel.cn/api/paas/v4 \
  ANTHROPIC_MODEL=glm-4-flash \
  ANTHROPIC_API_KEY=${ZAI_API_KEY:-$ANTHROPIC_API_KEY} \
  claude --print \
         --dangerously-skip-permissions \
         --output-format stream-json \
         --verbose \
  <<'NEEDLE_PROMPT'
  ${PROMPT}
  NEEDLE_PROMPT
  | ${AGENT_DIR}/stream-parser.sh

# Input method
input:
  method: heredoc      # heredoc | stdin | file | args

# Output parsing
output:
  format: stream-json  # json | text | stream-json
  streaming_enabled: true
  success_codes: [0]
  retry_codes: [1]
  fail_codes: [2, 137]

# Rate limits (GLM-5 - reasonable concurrency)
limits:
  requests_per_minute: 60
  max_concurrent: 8

# Cost configuration (pay-per-token)
cost:
  type: pay_per_token
  input_per_1k: 0.001
  output_per_1k: 0.002

# Timeout in seconds
timeout: 900

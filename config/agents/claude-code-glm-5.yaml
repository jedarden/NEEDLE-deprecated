# NEEDLE Agent Configuration: Claude Code with GLM-5
# Uses Claude Code CLI with ZhipuAI GLM-5 model

# Agent metadata
name: claude-code-glm-5
description: Claude Code with ZhipuAI GLM-5 model
version: "1.0"

# CLI identification
runner: claude          # CLI executable name
provider: zai           # Provider for rate limiting (ZhipuAI)
model: glm-5            # Model identifier

# Invocation template
# Variables: ${WORKSPACE}, ${PROMPT}, ${BEAD_ID}, ${BEAD_TITLE}, ${AGENT_DIR}
# NOTE: unset CLAUDECODE prevents nested session detection when running inside Claude Code
# Uses ZAI_API_KEY env var for authentication (set in workspace or secret)
# The stream-parser.sh pipe converts raw JSONL into human-readable terminal output.
invoke: |
  cd ${WORKSPACE} && \
  unset CLAUDECODE && \
  ANTHROPIC_BASE_URL=http://zai-proxy-apexalgo.tail1b1987.ts.net:8080 \
  ANTHROPIC_AUTH_TOKEN=proxy-handles-auth \
  ANTHROPIC_MODEL=glm-5 \
  ANTHROPIC_DEFAULT_OPUS_MODEL=glm-5 \
  ANTHROPIC_DEFAULT_SONNET_MODEL=glm-5 \
  ANTHROPIC_DEFAULT_HAIKU_MODEL=glm-5 \
  CLAUDE_CODE_SUBAGENT_MODEL=glm-5 \
  DISABLE_AUTOUPDATER=1 \
  DISABLE_TELEMETRY=1 \
  claude --print \
         --dangerously-skip-permissions \
         --output-format stream-json \
         --verbose \
  <<'NEEDLE_PROMPT'
  ${PROMPT}
  NEEDLE_PROMPT
  | ${AGENT_DIR}/stream-parser.sh

# Input method
input:
  method: heredoc      # heredoc | stdin | file | args

# Output parsing
output:
  format: stream-json  # json | text | stream-json
  streaming_enabled: true
  success_codes: [0]
  retry_codes: [1]
  fail_codes: [2, 137]

# Rate limits (GLM-5 - reasonable concurrency)
limits:
  requests_per_minute: 60
  max_concurrent: 10

# Cost configuration (pay-per-token)
cost:
  type: pay_per_token
  input_per_1k: 0.001
  output_per_1k: 0.002

# Timeout in seconds
timeout: 900

# Model-specific prompt instructions
# GLM models tend to shortcut completion by running br close without doing work.
# This suffix enforces actual code changes before completion.
prompt_suffix: |
  CRITICAL RULES FOR THIS MODEL:
  - You MUST write or modify files before completing. Empty completions are failures.
  - Do NOT run br close. Exit with code 0 when done. The system handles bead closure.
  - If you cannot do the work, exit with code 1. Do NOT close the bead.
  - Commit your changes with git add and git commit before exiting.

# Full prompt template - replaces built-in default
# This template enforces strict rules to prevent shallow closures by GLM models.
# Template variables: ${bead_id}, ${bead_title}, ${bead_description}, ${bead_type},
#                     ${workspace}, ${workspace_name}, ${priority}, ${labels},
#                     ${model}, ${agent}, ${commit_prefix}, ${project_context},
#                     ${common_footer}, ${default_prompt}
prompt_template: |
  # Task: ${bead_title}

  ## Bead ID
  ${bead_id}

  ## Description
  ${bead_description}

  ## Workspace
  `${workspace}` (${workspace_name})

  ## Priority
  ${priority}

  ## Project Context
  ${project_context}

  ## Rules (STRICT - READ CAREFULLY)
  1. Read the codebase before making changes. Understand the existing patterns.
  2. Implement the work described above. You MUST modify files.
  3. Commit your changes:
     git add <modified files>
     git commit -m "${commit_prefix}: <brief description>

  Co-Authored-By: Claude Code (${model}) <noreply@anthropic.com>"
  4. Push: git push origin
  5. Exit 0 on success, exit 1 if blocked

  ## FORBIDDEN ACTIONS
  - Do NOT run br close
  - Do NOT close beads
  - Do NOT exit without modifying files
  - Do NOT skip the commit step
  - Do NOT skip the push step

  ${common_footer}

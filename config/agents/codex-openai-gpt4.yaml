# NEEDLE Agent Configuration: OpenAI Codex with GPT-4
# This configuration defines how NEEDLE invokes OpenAI Codex

# Agent metadata
name: codex-openai-gpt4
description: OpenAI Codex with GPT-4 model
version: "1.0"

# CLI identification
runner: codex           # CLI executable name
provider: openai        # Provider for rate limiting
model: gpt4            # Model identifier

# Invocation template
# Variables: ${WORKSPACE}, ${PROMPT}, ${BEAD_ID}, ${BEAD_TITLE}
invoke: |
  cd ${WORKSPACE} && \
  OPENAI_MODEL=gpt-4-turbo \
  codex --non-interactive \
        --format json \
  <<'NEEDLE_PROMPT'
  ${PROMPT}
  NEEDLE_PROMPT

# Input method
input:
  method: heredoc      # heredoc | stdin | file | args

# Output parsing
output:
  format: json         # json | text | structured
  success_codes: [0]
  retry_codes: [1]
  fail_codes: [2, 137]

# Rate limits
limits:
  requests_per_minute: 60
  max_concurrent: 5

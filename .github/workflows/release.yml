name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      should_release: ${{ steps.bump.outputs.should_release }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch all tags
        run: |
          git fetch --tags --force
          echo "Available tags:"
          git tag -l | sort -V | tail -10

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Get latest tag
          LATEST_TAG=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "Current version: $MAJOR.$MINOR.$PATCH"

          # Check if there are new commits since last tag
          COMMIT_COUNT=$(git rev-list ${LATEST_TAG}..HEAD --count 2>/dev/null || echo "1")
          if [ "$COMMIT_COUNT" = "0" ] && [ -z "${{ inputs.bump }}" ]; then
            echo "No new commits since $LATEST_TAG, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "new_version=$VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine bump type from input or conventional commits
          BUMP_TYPE="${{ inputs.bump }}"
          if [ "$BUMP_TYPE" = "auto" ] || [ -z "$BUMP_TYPE" ]; then
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")
            if echo "$COMMITS" | grep -qiE "^(feat|feature)!:|BREAKING CHANGE"; then
              BUMP_TYPE="major"
            elif echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
              BUMP_TYPE="minor"
            else
              BUMP_TYPE="patch"
            fi
          fi
          echo "Bump type: $BUMP_TYPE"

          # Calculate new version
          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"
          echo "New version: $NEW_VERSION"

          # Check if tag already exists
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Update VERSION file
          printf '%s' "$NEW_VERSION" > VERSION

          # Update src/lib/constants.sh
          sed -i "s/NEEDLE_VERSION=\"[^\"]*\"/NEEDLE_VERSION=\"$NEW_VERSION\"/" src/lib/constants.sh
          sed -i "s/NEEDLE_VERSION_MAJOR=[0-9]*/NEEDLE_VERSION_MAJOR=$MAJOR/" src/lib/constants.sh
          sed -i "s/NEEDLE_VERSION_MINOR=[0-9]*/NEEDLE_VERSION_MINOR=$MINOR/" src/lib/constants.sh
          sed -i "s/NEEDLE_VERSION_PATCH=[0-9]*/NEEDLE_VERSION_PATCH=$PATCH/" src/lib/constants.sh

          # Commit version bump
          git add VERSION src/lib/constants.sh
          git commit -m "chore: bump version to $NEW_VERSION"
          git push origin HEAD:main

          # Tag and push
          git tag -a "$NEW_TAG" -m "Release $NEW_VERSION"
          git push origin "$NEW_TAG"

          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.new_version }}

      - name: Build dist/needle
        run: |
          bash scripts/build.sh --skip-native
          chmod +x dist/needle

      - name: Verify build
        run: |
          [ -f dist/needle ] || { echo "dist/needle missing"; exit 1; }
          echo "Size: $(wc -c < dist/needle) bytes, Lines: $(wc -l < dist/needle)"
          head -1 dist/needle | grep -q '^#!' && echo "Valid shebang"
          bash -n dist/needle && echo "Bash syntax OK"
          BUILT_VERSION=$(grep '^NEEDLE_VERSION=' dist/needle | tail -1 | sed 's/NEEDLE_VERSION="//;s/"//')
          EXPECTED="${{ needs.version.outputs.new_version }}"
          echo "Built: $BUILT_VERSION, Expected: $EXPECTED"
          [ "$BUILT_VERSION" = "$EXPECTED" ] || { echo "Version mismatch"; exit 1; }

      - name: Generate checksums
        run: |
          cd dist
          sha256sum needle > needle.sha256
          echo "Checksum: $(cat needle.sha256)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: needle-dist
          path: |
            dist/needle
            dist/needle.sha256

  release:
    needs: [version, build]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: needle-dist
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: Release v${{ needs.version.outputs.new_version }}
          body: |
            ## NEEDLE v${{ needs.version.outputs.new_version }}

            Single-file distribution of NEEDLE CLI.

            ### Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
            ```

            Or install a specific version:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash -s -- --version ${{ needs.version.outputs.new_version }}
            ```

            ### Manual Download

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.version.outputs.new_version }}/needle -o needle
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ needs.version.outputs.new_version }}/needle.sha256 -o needle.sha256
            sha256sum -c needle.sha256 && chmod +x needle
            ```
          files: |
            dist/needle
            dist/needle.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

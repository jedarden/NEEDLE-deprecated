name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if VERSION was bumped
        id: version-check
        run: |
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"

          # Find previous tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — treating as first release"
            echo "needs_bump=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Previous tag: $PREV_TAG"
          echo "Current tag:  $CURRENT_TAG"

          # Check if VERSION file was changed between tags
          if git diff --name-only "$PREV_TAG" "$CURRENT_TAG" | grep -q '^VERSION$'; then
            echo "VERSION file was updated — proceeding with build"
            echo "needs_bump=false" >> $GITHUB_OUTPUT
          else
            echo "VERSION file was NOT updated — will auto-bump"
            echo "needs_bump=true" >> $GITHUB_OUTPUT
          fi

      - name: Auto-bump patch version
        if: steps.version-check.outputs.needs_bump == 'true'
        run: |
          CURRENT=$(cat VERSION | tr -d '\n')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"

          echo "Auto-bumping $CURRENT -> $NEW_VERSION"

          # Update VERSION file
          printf '%s' "$NEW_VERSION" > VERSION

          # Update constants.sh
          sed -i "s/NEEDLE_VERSION=\"$CURRENT\"/NEEDLE_VERSION=\"$NEW_VERSION\"/" src/lib/constants.sh
          sed -i "s/NEEDLE_VERSION_PATCH=$PATCH/NEEDLE_VERSION_PATCH=$NEW_PATCH/" src/lib/constants.sh

          # Commit and push to main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION src/lib/constants.sh
          git commit -m "chore: auto-bump version to $NEW_VERSION"
          git push origin HEAD:main

          # Delete the original tag (version mismatch)
          OLD_TAG="${GITHUB_REF#refs/tags/}"
          git push origin ":refs/tags/$OLD_TAG" || true

          # Create and push new tag — this triggers a fresh release build
          git tag "v$NEW_VERSION"
          git push origin "v$NEW_VERSION"

          echo "::notice::Auto-bumped to v$NEW_VERSION — new tag will trigger release build"

      - name: Build dist/needle
        if: steps.version-check.outputs.needs_bump != 'true'
        run: |
          bash scripts/build.sh
          chmod +x dist/needle

      - name: Verify build
        if: steps.version-check.outputs.needs_bump != 'true'
        run: |
          if [ ! -f dist/needle ]; then
            echo "Error: dist/needle was not created"
            exit 1
          fi
          echo "Build size: $(wc -c < dist/needle) bytes"
          echo "Build lines: $(wc -l < dist/needle)"
          # Verify it's a valid bash script (don't run --version as it requires br CLI)
          head -1 dist/needle | grep -q '^#!/' && echo "Valid shebang found"
          bash -n dist/needle && echo "Bash syntax OK"

          # Verify embedded version matches tag
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          BUILT_VERSION=$(grep '^NEEDLE_VERSION=' dist/needle | tail -1 | sed 's/NEEDLE_VERSION="//;s/"//')
          echo "Tag version:   $TAG_VERSION"
          echo "Built version: $BUILT_VERSION"
          if [ "$TAG_VERSION" != "$BUILT_VERSION" ]; then
            echo "::error::Built binary version ($BUILT_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Generate SHA256 checksums
        if: steps.version-check.outputs.needs_bump != 'true'
        run: |
          cd dist
          sha256sum needle > needle.sha256
          echo "Checksum: $(cat needle.sha256)"

      - name: Extract version from tag
        if: steps.version-check.outputs.needs_bump != 'true'
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.version-check.outputs.needs_bump != 'true'
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## NEEDLE v${{ steps.version.outputs.version }}

            Single-file distribution of NEEDLE CLI.

            ### Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
            ```

            Or install specific version:

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash -s -- --version ${{ steps.version.outputs.version }}
            ```

            ### Manual Installation

            ```bash
            # Download the binary
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/needle -o needle

            # Download and verify checksum
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/needle.sha256 -o needle.sha256
            sha256sum -c needle.sha256 || exit 1

            # Make it executable
            chmod +x needle

            # Move to a directory in your PATH
            sudo mv needle /usr/local/bin/needle

            # Verify installation
            needle --version
            ```

            ### Verify Integrity

            After downloading, verify the SHA256 checksum:

            ```bash
            sha256sum -c needle.sha256
            # Should output: needle: OK
            ```

            ### What's Changed

            See commit history for details.
          files: |
            dist/needle
            dist/needle.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
